<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>规培模拟器</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --danger: #dc2626;
      --ok: #059669;
      --border: #e5e7eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --primary: #3b82f6;
        --danger: #ef4444;
        --ok: #10b981;
        --border: #1f2937;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .card {
      width: min(780px, 96vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin: 0 0 14px;
      font-size: 24px;
      text-align: center;
    }

    #info {
      margin: 0 0 8px;
      font-weight: 600;
    }

    #event {
      margin: 0 0 16px;
      min-height: 24px;
      color: var(--muted);
      white-space: pre-line;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    button {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.2s ease, background-color 0.2s ease;
    }

    button:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    #startBtn,
    #restartBtn {
      border-color: var(--primary);
      color: var(--primary);
    }

    .status-ok {
      color: var(--ok);
    }

    .status-fail {
      color: var(--danger);
    }

    .ending-title {
      display: block;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="card">
    <h2>规培模拟器</h2>
    <p id="info"></p>
    <p id="event"></p>

    <div class="actions">
      <button id="startBtn">开始规培</button>
      <button id="action1"></button>
      <button id="action2"></button>
      <button id="action3"></button>
      <button id="restartBtn">重新开始</button>
    </div>
  </main>

  <script>
    let state = null;
    let gamesStarted = 0;
    let uiMode = null;

    const ACTIONS = [
      {
        label: "精进临床（临床能力+3，体力-2）",
        apply: (s) => {
          s.cap += 3;
          s.hp -= 2;
          return ["临床能力+3", "体力-2"];
        }
      },
      {
        label: "努力科研（科研能力+3，精神-2）",
        apply: (s) => {
          s.research += 3;
          s.mp -= 2;
          return ["科研能力+3", "精神-2"];
        }
      },
      {
        label: "划水摸鱼（精神+5，体力+5）",
        apply: (s) => {
          const maxStat = maxStatFor(s);
          s.mp = Math.min(maxStat, s.mp + 5);
          s.hp = Math.min(maxStat, s.hp + 5);
          return ["精神+5", "体力+5"];
        }
      }
    ];

    const BOONS = [
      {
        id: "high-energy",
        name: "高精力人群",
        desc: "体力+50，精力+50"
      },
      {
        id: "medical-family",
        name: "医学世家",
        desc: "每月体力-1改为科研+1，最后一月必定出现读博选项"
      },
      {
        id: "research-body",
        name: "科研圣体",
        desc: "科研行动不再扣除精神"
      },
      {
        id: "clinical-body",
        name: "临床圣体",
        desc: "临床行动不再扣除体力"
      }
    ];

    const el = {
      info: document.getElementById("info"),
      event: document.getElementById("event"),
      startBtn: document.getElementById("startBtn"),
      restartBtn: document.getElementById("restartBtn"),
      actionBtns: [
        document.getElementById("action1"),
        document.getElementById("action2"),
        document.getElementById("action3")
      ]
    };

    function pickDistinctMonths(count, start, end) {
      const pool = [];
      for (let m = start; m <= end; m += 1) pool.push(m);
      for (let i = pool.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, count);
    }

    function buildMonthEvents(totalMonths = 33) {
      const emergencyMonths = new Set(pickDistinctMonths(3, 1, totalMonths));
      const events = {};
      const randomEventPool = [
        {
          text: "高强度值班（体力-3）科室人手短缺，本月你被安排了6个夜班。",
          apply: (s) => {
            s.hp -= 3;
          }
        },
        {
          text: "导师的任务（精神-3）导师有了新的idea，你需要在一个月内完成。",
          apply: (s) => {
            s.mp -= 3;
          }
        },
        {
          text: "平平无奇（没有属性变化）平稳过渡的一月，没发生大事。",
          apply: () => {}
        },
        {
          text: "高压地带（精神-3）轮转科室氛围紧张，科室人员互相推诿攻击，你和其他组员们每天加班又挨骂。",
          apply: (s) => {
            s.mp -= 3;
          }
        },
        {
          text: "吃好喝好（精神+3）轮转科室氛围很好，带教热心教学，还经常买吃买喝犒劳大家。",
          apply: (s) => {
            s.mp = Math.min(100, s.mp + 3);
          }
        }
      ];

      for (let m = 1; m <= totalMonths; m += 1) {
        if (emergencyMonths.has(m)) {
          events[m] = {
            text: "急诊轮转（体力-5，精神-5）昼夜颠倒，连轴转一整月，你甚至不知道今天是周几。",
            apply: (s) => {
              s.hp -= 5;
              s.mp -= 5;
            }
          };
          continue;
        }

        const randomEvent = randomEventPool[Math.floor(Math.random() * randomEventPool.length)];
        events[m] = {
          text: randomEvent.text,
          apply: randomEvent.apply
        };
      }

      return events;
    }

    function toggleActionButtons(show) {
      el.actionBtns.forEach((btn) => {
        btn.style.display = show ? "inline-block" : "none";
        btn.disabled = !show;
      });
    }

    function setEventText(text, type = "normal", useHtml = false) {
      if (useHtml) {
        el.event.innerHTML = text;
      } else {
        el.event.textContent = text;
      }
      el.event.classList.remove("status-ok", "status-fail");
      if (type === "ok") el.event.classList.add("status-ok");
      if (type === "fail") el.event.classList.add("status-fail");
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatRandomEventText(text) {
      const escaped = escapeHtml(text);
      const splitAt = escaped.indexOf("）");
      if (splitAt === -1) return escaped;
      return `${escaped.slice(0, splitAt + 1)}<br>${escaped.slice(splitAt + 1).trimStart()}`;
    }

    function maxStatFor(s) {
      return s && s.boon && s.boon.id === "high-energy" ? 150 : 100;
    }

    function getActionLabel(index) {
      if (!state || !state.boon) return ACTIONS[index].label;
      if (state.boon.id === "research-body" && index === 1) {
        return "努力科研（科研能力+3，精神-0）";
      }
      if (state.boon.id === "clinical-body" && index === 0) {
        return "精进临床（临床能力+3，体力-0）";
      }
      return ACTIONS[index].label;
    }

    function getWorkEffectText() {
      if (state && state.boon && state.boon.id === "medical-family") {
        return "本月你辛勤工作，临床能力+1，科研能力+1。工作之余，你决定：";
      }
      return "本月你辛勤工作，临床能力+1，体力-1。工作之余，你决定：";
    }

    function showLotteryPrompt() {
      uiMode = "lottery";
      setEventText(
        `<strong>还要再来一次吗？或许你需要一些命运的馈赠。</strong><br>` +
          `选择“接受”将随机获得一项天赋。`,
        "normal",
        true
      );
      el.startBtn.style.display = "none";
      el.restartBtn.style.display = "none";
      el.actionBtns[0].textContent = "接受";
      el.actionBtns[1].textContent = "我命由我不由天";
      el.actionBtns[0].style.display = "inline-block";
      el.actionBtns[1].style.display = "inline-block";
      el.actionBtns[2].style.display = "none";
      el.actionBtns[0].disabled = false;
      el.actionBtns[1].disabled = false;
      el.actionBtns[2].disabled = true;
    }

    function startFlow() {
      if (gamesStarted < 1) {
        startGame(null);
        return;
      }
      showLotteryPrompt();
    }

    function initUI() {
      uiMode = null;
      el.info.textContent = "";
      setEventText(
        `<strong>恭喜你成为一名专硕研究生，开始你的33个月规培生涯吧！</strong><br>` +
          `重要节点提示：<br>` +
          `1. 第12个月：执业医师考试（临床能力>=30）<br>` +
          `2. 第32个月：毕业论文（科研能力>=30）<br>` +
          `3. 第33个月：规培结业考试（临床能力>=60）`,
        "normal",
        true
      );
      el.startBtn.style.display = "inline-block";
      toggleActionButtons(false);
      el.restartBtn.style.display = "none";
    }

    function startGame(selectedBoon = null) {
      const maxStat = selectedBoon && selectedBoon.id === "high-energy" ? 150 : 100;
      state = {
        hp: maxStat,
        mp: maxStat,
        cap: 0,
        research: 0,
        boon: selectedBoon,
        fishCount: 0,
        careerPromptOffered: false,
        careerPromptContext: null,
        month: 0,
        canChoose: true,
        pendingDecision: null,
        weaknessQueue: [],
        pendingMonthContext: null,
        weaknessWarned: {
          mp60: false,
          mp30: false,
          hp60: false,
          hp30: false
        },
        needRetest: false,
        gameOver: false,
        monthEvents: buildMonthEvents(33)
      };

      gamesStarted += 1;
      uiMode = null;
      el.startBtn.style.display = "none";
      nextMonth();
    }

    function updateUI(text = "", type = "normal") {
      if (!state) return;
      el.info.textContent = `第 ${state.month}/33 月 | 体力:${state.hp} 精神:${state.mp} 临床能力:${state.cap} 科研能力:${state.research}`;
      setEventText(text, type);
    }

    function renderInfoOnly() {
      if (!state) return;
      el.info.textContent = `第 ${state.month}/33 月 | 体力:${state.hp} 精神:${state.mp} 临床能力:${state.cap} 科研能力:${state.research}`;
    }

    function renderStandardAction(prefixText = "", useHtml = false, type = "normal") {
      state.canChoose = true;
      renderInfoOnly();
      const baseText = getWorkEffectText();
      const text = prefixText ? `${prefixText}${useHtml ? "<br><br>" : "\n\n"}${baseText}` : baseText;
      setEventText(text, type, useHtml);
      ACTIONS.forEach((action, i) => {
        const btn = el.actionBtns[i];
        btn.textContent = getActionLabel(i);
      });
      toggleActionButtons(true);
    }

    function showAction(prefixText = "", useHtml = false, type = "normal") {
      if (
        state &&
        state.fishCount > 10 &&
        !state.careerPromptOffered &&
        state.pendingDecision !== "career-switch"
      ) {
        state.pendingDecision = "career-switch";
        state.careerPromptContext = { prefixText, useHtml, type };
        state.canChoose = true;
        renderInfoOnly();
        const questionText = "你看着医院外的风景，渐渐产生了一个想法：或许我也能做其他的工作？";
        const text = prefixText
          ? `${prefixText}${useHtml ? "<br><br>" : "\n\n"}<strong>${questionText}</strong>`
          : `<strong>${questionText}</strong>`;
        setEventText(text, "normal", true);
        el.actionBtns[0].textContent = "转行试试";
        el.actionBtns[1].textContent = "继续坚持";
        el.actionBtns[0].style.display = "inline-block";
        el.actionBtns[1].style.display = "inline-block";
        el.actionBtns[0].disabled = false;
        el.actionBtns[1].disabled = false;
        el.actionBtns[2].style.display = "none";
        el.actionBtns[2].disabled = true;
        return;
      }

      renderStandardAction(prefixText, useHtml, type);
    }

    function showPhdDecision(prefixHtml) {
      state.canChoose = true;
      state.pendingDecision = "phd";
      renderInfoOnly();
      setEventText(
        `${prefixHtml}<br><strong>【特殊选项】你的科研成果丰富（科研能力>=60），得到了博导的青睐。是否申博继续深造？</strong>`,
        "normal",
        true
      );
      el.actionBtns[0].textContent = "是，读博深造";
      el.actionBtns[1].textContent = "否，直接结业";
      el.actionBtns[0].style.display = "inline-block";
      el.actionBtns[1].style.display = "inline-block";
      el.actionBtns[0].disabled = false;
      el.actionBtns[1].disabled = false;
      el.actionBtns[2].style.display = "none";
      el.actionBtns[2].disabled = true;
    }

    function endGame(text, type = "fail", useHtml = false) {
      state.gameOver = true;
      setEventText(text, type, useHtml);
      toggleActionButtons(false);
      el.restartBtn.style.display = "inline-block";
    }

    function checkSurvival() {
      if (state.hp <= 0) {
        endGame(
          `<strong class="ending-title" style="color: var(--danger);">【结局】医者不自医</strong><br>` +
          `你的床前站着很多人，有你认识的也有不认识的。每个人都希望你能醒过来。可惜现在你必须休息了。`,
          "fail",
          true
        );
        return false;
      }
      if (state.mp <= 0) {
        endGame(
          `<strong class="ending-title" style="color: var(--danger);">【结局】堂吉诃德</strong><br>` +
          `你夜以继日地与风车和羊群作战，但说你疯了的人越来越多。终于在某一天，你被认定无法继续工作，送回了家。`,
          "fail",
          true
        );
        return false;
      }
      return true;
    }

    function showWeaknessDecisionPrompt() {
      if (!state || state.weaknessQueue.length === 0) return;
      const prompt = state.weaknessQueue[0];
      state.pendingDecision = "weakness";
      state.canChoose = true;
      renderInfoOnly();
      setEventText(
        `<strong style="color: var(--danger);">【状态预警】${escapeHtml(prompt.title)}</strong><br>` +
        `${escapeHtml(prompt.detail)}<br><strong>要继续坚持吗？</strong>`,
        "fail",
        true
      );
      el.actionBtns[0].textContent = "坚持";
      el.actionBtns[1].textContent = "退出";
      el.actionBtns[0].style.display = "inline-block";
      el.actionBtns[1].style.display = "inline-block";
      el.actionBtns[0].disabled = false;
      el.actionBtns[1].disabled = false;
      el.actionBtns[2].style.display = "none";
      el.actionBtns[2].disabled = true;
    }

    function checkWeaknessPrompts() {
      if (!state || state.gameOver) return true;
      state.weaknessQueue = [];

      if (state.mp < 60 && !state.weaknessWarned.mp60) {
        state.weaknessQueue.push({
          title: "精神衰弱：虽然疲惫，但你时常失眠。你觉得自己的情绪似乎阴晴不定，但又无从发泄。",
          detail: `当前精神=${state.mp}（低于60）`
        });
        state.weaknessWarned.mp60 = true;
      }
      if (state.mp < 30 && !state.weaknessWarned.mp30) {
        state.weaknessQueue.push({
          title: "精神濒临崩溃：你觉得精疲力竭，时常被莫名的负面情绪裹挟难以脱身。你发现自己频繁忘记事情，总是工作出错。你需要放松。",
          detail: `当前精神=${state.mp}（低于30，已进入高危状态）`
        });
        state.weaknessWarned.mp30 = true;
      }

      if (state.hp < 60 && !state.weaknessWarned.hp60) {
        state.weaknessQueue.push({
          title: "体质衰弱：明明是个年轻人，但你最近小病不断，吃着药也不见好。",
          detail: `当前体力=${state.hp}（低于60）`
        });
        state.weaknessWarned.hp60 = true;
      }
      if (state.hp < 30 && !state.weaknessWarned.hp30) {
        state.weaknessQueue.push({
          title: "身体濒临极限：你已经带病上班有段时间了。你的身体状况每况愈下，工作久了总是头晕，夜班之后常常心悸。该休息了。",
          detail: `当前体力=${state.hp}（低于30，已进入高危状态）`
        });
        state.weaknessWarned.hp30 = true;
      }

      if (state.weaknessQueue.length === 0) return true;
      showWeaknessDecisionPrompt();
      return false;
    }

    function chooseAction(index) {
      if (!state) {
        if (uiMode === "lottery") {
          if (index === 0) {
            const boon = BOONS[Math.floor(Math.random() * BOONS.length)];
            startGame(boon);
          } else {
            initUI();
          }
        }
        return;
      }

      if (!state.canChoose || state.gameOver) return;
      state.canChoose = false;

      if (state.pendingDecision === "weakness") {
        toggleActionButtons(false);
        if (index === 1) {
          endGame(
            `<strong class="ending-title" style="color: var(--text);">【结局】塞翁失马</strong><br>` +
            `你选择暂时退学休整。眼前虽有遗憾，但你的人生还很长，选择还很多，一切总会在某处迎来转机。`,
            "normal",
            true
          );
          return;
        }

        state.weaknessQueue.shift();
        if (state.weaknessQueue.length > 0) {
          showWeaknessDecisionPrompt();
          return;
        }

        state.pendingDecision = null;
        if (state.pendingMonthContext) {
          runMonthFlow(state.pendingMonthContext.randomLine);
        }
        return;
      }

      if (state.pendingDecision === "phd") {
        state.pendingDecision = null;
        toggleActionButtons(false);
        if (index === 0) {
          endGame(
            `<strong class="ending-title" style="color: var(--text);">【结局】三年又...三年？</strong><br>` +
            `“磨刀不误砍柴工，读完博士再打工”，你打算在博士期间积攒更多的经验与成果。何况眼下找工作对硕士来说也并非易事，学历的提升或许能带来更多选择。`,
            "normal",
            true
          );
        } else {
          endGame(
            `<strong class="ending-title" style="color: var(--text);">【结局】结业入职</strong><br>` +
            `你完成规培，在招聘季奋战一番后正式走上临床岗位。非教学医院里没有规培生分担工作，你依然忙忙碌碌地管病人、值夜班。不过毕竟是越老越吃香的行业，未来的日子应该会越过越轻松吧？ `,
            "normal",
            true
          );
        }
        return;
      }

      if (state.pendingDecision === "career-switch") {
        toggleActionButtons(false);
        if (index === 0) {
          endGame(
            `<strong class="ending-title" style="color: var(--text);">【隐藏结局】人生是旷野</strong><br>` +
            `你决定找一份医疗系统之外的工作。虽然前路未知，但至少当下你重新找回了生活的掌控感。世界很大，而你相信人不论向哪里走都是向前。`,
            "normal",
            true
          );
          return;
        }

        state.pendingDecision = null;
        state.careerPromptOffered = true;
        const ctx = state.careerPromptContext || { prefixText: "", useHtml: false, type: "normal" };
        state.careerPromptContext = null;
        renderStandardAction(ctx.prefixText, ctx.useHtml, ctx.type);
        return;
      }

      ACTIONS[index].apply(state);
      if (index === 2) {
        state.fishCount += 1;
      }
      if (state.boon && state.boon.id === "research-body" && index === 1) {
        state.mp += 2;
      }
      if (state.boon && state.boon.id === "clinical-body" && index === 0) {
        state.hp += 2;
      }
      state.cap += 1;
      if (state.boon && state.boon.id === "medical-family") {
        state.research += 1;
      } else {
        state.hp -= 1;
      }
      const maxStat = maxStatFor(state);
      state.hp = Math.min(maxStat, state.hp);
      state.mp = Math.min(maxStat, state.mp);

      toggleActionButtons(false);
      nextMonth();
    }

    function runMonthFlow(randomLine) {
      if (!state || state.gameOver) return;
      state.pendingMonthContext = null;

      if (state.month === 12) {
        const specialText = state.cap >= 30 ? "执业医考试通过 🎓" : "你没能通过执业医师考试，导师震怒（精神-30）！请抓紧时间准备二试！";
        if (state.cap >= 30) {
          // no-op; only keep branch semantics
        } else {
          state.mp -= 30;
          state.needRetest = true;
          if (!checkSurvival()) return;
        }
        const specialHtml = state.cap >= 30
          ? `<strong style="color: var(--text);">【特殊事件】${escapeHtml(specialText)}</strong>`
          : `<strong style="color: var(--danger);">【特殊事件】${escapeHtml(specialText)}</strong>`;
        showAction(`${specialHtml}<br>${randomLine}`, true, state.cap >= 30 ? "normal" : "fail");
        return;
      }

      if (state.month === 15 && state.needRetest) {
        if (state.cap >= 30) {
          showAction(`<strong style="color: var(--text);">【特殊事件】补考通过 🎉拿到执医证啦！</strong><br>${randomLine}`, true);
        } else {
          endGame(
            `<strong class="ending-title" style="color: var(--danger);">【结局】学硕生涯</strong><br>` +
            `你未通过补考，转入学术硕士路径 📚`,
            "fail",
            true
          );
        }
        return;
      }

      if (state.month === 32) {
        if (state.research < 30) {
          endGame(
            `<strong class="ending-title" style="color: var(--danger);">【结局】延毕</strong><br>` +
            `毕业论文未通过，你只能延长学习周期 😭`,
            "fail",
            true
          );
        } else {
          showAction(`<strong style="color: var(--text);">【特殊事件】毕业论文顺利通过 ✔</strong><br>${randomLine}`, true);
        }
        return;
      }

      if (state.month === 33) {
        if (state.cap >= 60) {
          const finalExamText = `<strong style="color: var(--text);">【特殊事件】规培结业考试通过 🎓🎉</strong>`;
          if ((state.boon && state.boon.id === "medical-family") || state.research >= 60) {
            showPhdDecision(finalExamText);
          } else {
            endGame(
              `<strong class="ending-title" style="color: var(--text);">【结局】结业入职</strong><br>` +
              `你完成规培，在招聘季奋战一番后正式走上临床岗位。非教学医院里没有规培生分担工作，你依然忙忙碌碌地管病人、值夜班。不过毕竟是越老越吃香的行业，未来的日子应该会越过越轻松吧？ `,
              "normal",
              true
            );
          }
        } else {
          endGame(
            `<strong class="ending-title" style="color: var(--danger);">【结局】延毕</strong><br>` +
            `未能通过规培结业考试，你只能延长学习周期 😭`,
            "fail",
            true
          );
        }
        return;
      }

      showAction(randomLine, true);
    }

    function nextMonth() {
      if (!state || state.gameOver) return;
      state.month += 1;

      let monthEventText = "本月无特殊事件。";
      const monthEvent = state.monthEvents[state.month];
      if (monthEvent) {
        monthEvent.apply(state);
        monthEventText = monthEvent.text;
      }

      if (!checkSurvival()) return;

      const randomLine = `【随机事件】${formatRandomEventText(monthEventText)}`;
      const boonLine = state.month === 1 && state.boon
        ? `<strong>【命运馈赠】${escapeHtml(state.boon.name)}</strong>：${escapeHtml(state.boon.desc)}`
        : "";
      const displayLine = boonLine ? `${boonLine}<br>${randomLine}` : randomLine;
      state.pendingMonthContext = { randomLine: displayLine };
      if (!checkWeaknessPrompts()) return;

      runMonthFlow(displayLine);
    }

    function resetGame() {
      state = null;
      initUI();
    }

    el.startBtn.addEventListener("click", startFlow);
    el.restartBtn.addEventListener("click", resetGame);
    el.actionBtns.forEach((btn, i) => btn.addEventListener("click", () => chooseAction(i)));

    initUI();
  </script>
</body>
</html>
